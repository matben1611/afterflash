name: Lint and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  pssscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./windows/scripts -Recurse -Settings ./windows/scripts/PSScriptAnalyzerSettings.psd1
          $errors = $results | Where-Object { $_.Severity -eq 'Error' }
          $warnings = $results | Where-Object { $_.Severity -eq 'Warning' }
          
          if ($errors) {
            Write-Host "❌ ERRORS found:" -ForegroundColor Red
            $errors | Format-Table
            exit 1
          }
          
          if ($warnings) {
            Write-Host "⚠️  WARNINGS found (non-blocking):" -ForegroundColor Yellow
            $warnings | Format-Table
          }
          
          if (-not $results) {
            Write-Host "✅ PSScriptAnalyzer: All checks passed!" -ForegroundColor Green
          }

  pester:
    name: Pester Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Pester
        shell: pwsh
        run: |
          Remove-Module Pester -Force -ErrorAction SilentlyContinue
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Debug - Show directory structure
        shell: pwsh
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in workspace:"
          Get-ChildItem -Recurse -Depth 2 | Select-Object -First 30
          Write-Host ""
          Write-Host "Setup script exists: $(Test-Path './windows/scripts/setup.ps1')"
          Write-Host "Tests script exists: $(Test-Path './windows/tests/setup.tests.ps1')"

      - name: Run Pester Tests
        shell: pwsh
        run: |
          Remove-Module Pester -Force -ErrorAction SilentlyContinue
          Invoke-Pester -Path ./windows/tests/*.tests.ps1 -Output Detailed

  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run markdownlint
        continue-on-error: true
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
